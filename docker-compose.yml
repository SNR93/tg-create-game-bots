services:
  postgres:
    image: postgres:16-alpine
    container_name: tgbot-postgres
    environment:
      POSTGRES_DB: tgbot
      POSTGRES_USER: tgbot
      POSTGRES_PASSWORD: tgbot
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tgbot -d tgbot"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tgbot-redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: tgbot-backend
    ports:
      - "4001:3001"
    volumes:
      - ./backend/data:/app/data
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://tgbot:tgbot@postgres:5432/tgbot
      - REDIS_URL=redis://redis:6379
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-}
      - AUTH_USERS=${AUTH_USERS:-}
      - AUTH_SECRET=${AUTH_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: tgbot-frontend
    ports:
      - "4000:80"
    volumes:
      # Mount media directory read-only so nginx can serve files directly
      - ./backend/data/media:/data/media:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres-data:
